name: AI Reviewer Caller

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  call-audit:

    permissions:
      contents: read
      pull-requests: write
      issues: write

    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/review'))
    
    # 引用模板（确保是 @master）
    uses: bank-ski/central-ops/.github/workflows/ai-audit-template.yml@master
    secrets:
      inherit